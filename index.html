<script src="https://unpkg.com/@green-api/whatsapp-api-client/lib/whatsapp-api-client.min.js"></script>

<script>
  function setStatus(text) {
    document.getElementById('status').textContent = text;
  }

  function showResponse(data) {
    const responseBox = document.getElementById('response');
    if (typeof data === 'string') {
      responseBox.textContent = data;
      return;
    }
    responseBox.textContent = JSON.stringify(data, null, 2);
  }

  function getCredentials() {
    const idInstance = document.getElementById('idInstance').value.trim();
    const apiTokenInstance = document.getElementById('apiToken').value.trim();

    if (!idInstance || !apiTokenInstance) {
      throw new Error('Сначала заполни idInstance и ApiTokenInstance.');
    }

    return { idInstance, apiTokenInstance };
  }

  function getRestApi() {
    const { idInstance, apiTokenInstance } = getCredentials();

    return whatsAppClient.restAPI({
      idInstance,
      apiTokenInstance
    });
  }

  function normalizePhone(phone) {
    const cleanPhone = phone.replace(/\D/g, '');
    if (!cleanPhone) {
      throw new Error('Нужно указать номер телефона.');
    }
    return cleanPhone + '@c.us';
  }

  async function runMethod(methodName, callback) {
    try {
      setStatus('Отправка запроса...');
      showResponse('Подожди, выполняется запрос...');

      const restAPI = getRestApi();
      const data = await callback(restAPI);

      showResponse({
        method: methodName,
        response: data
      });

      setStatus('Успешно');
    } catch (error) {
      setStatus('Ошибка');
      showResponse({
        error: error.message || String(error)
      });
    }
  }

  function getSettings() {
    runMethod('getSettings', (restAPI) => restAPI.account.getSettings());
  }

  function getStateInstance() {
    runMethod('getStateInstance', (restAPI) => restAPI.account.getStateInstance());
  }

  function sendMessage() {
    try {
      const phone = document.getElementById('phoneMessage').value.trim();
      const message = document.getElementById('messageText').value.trim();

      if (!message) {
        throw new Error('Введите текст сообщения.');
      }

      runMethod('sendMessage', (restAPI) =>
        restAPI.message.sendMessage(normalizePhone(phone), null, message)
      );
    } catch (error) {
      setStatus('Ошибка');
      showResponse({ error: error.message });
    }
  }

  function sendFileByUrl() {
    try {
      const phone = document.getElementById('phoneFile').value.trim();
      const fileUrl = document.getElementById('fileUrl').value.trim();

      if (!fileUrl) {
        throw new Error('Введите URL файла.');
      }

      const fileName = fileUrl.split('/').pop() || 'file';

      runMethod('sendFileByUrl', (restAPI) =>
        restAPI.file.sendFileByUrl(normalizePhone(phone), null, fileName, fileUrl)
      );
    } catch (error) {
      setStatus('Ошибка');
      showResponse({ error: error.message });
    }
  }
</script>
